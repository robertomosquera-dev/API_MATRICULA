services:
  db:
    image: postgres:16-alpine
    container_name: tuition-db
    environment:
      - POSTGRES_USER=${BD_USER}
      - POSTGRES_PASSWORD=${BD_PASS}
      - POSTGRES_DB=${BD_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    networks:
      - tuition-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BD_USER} -d ${BD_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis-cache:
    image: redis:8-alpine
    container_name: tuition-redis
    ports:
      - "6370:6379"
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis-data:/data
    networks:
      - tuition-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: tuition-keycloak
    command: start-dev --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/${KC_DB_NAME}
      - KC_DB_USERNAME=${BD_USER}
      - KC_DB_PASSWORD=${BD_PASS}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${CONSOLE_USER}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${CONSOLE_PASSWORD}
      - KC_HEALTH_ENABLED=true
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "9090:8080"
    networks:
      - tuition-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  tuition-app:
    build: .
    container_name: tuition-app
    environment:
      - BD_URL=${BD_URL}
      - BD_USER=${BD_USER}
      - BD_PASS=${BD_PASS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASS}
      - ADMIN_CLI=${ADMIN_CLI}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - REALM_NAME=${REALM_NAME}
      - REALM_MASTER=${REALM_MASTER}
      - RESOURCE_ID=${RESOURCE_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - ROLE_USER=${ROLE_USER}
      - CONSOLE_USER=${CONSOLE_USER}
      - CONSOLE_PASSWORD=${CONSOLE_PASSWORD}
    ports:
      - "8090:8080"
    networks:
      - tuition-net
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

volumes:
  db-data:
  redis-data:

networks:
  tuition-net: